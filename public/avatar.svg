<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neon-glow-profile">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.8; }
      }
      .neon-profile {
        animation: pulse 2s ease-in-out infinite;
        filter: drop-shadow(0 0 8px #22d3ee) drop-shadow(0 0 16px #0891b2);
      }
    </style>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="20" y="20" width="160" height="160" rx="32" fill="#001a1f" stroke="#0891b2" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Profile icon -->
  <g class="neon-profile">
    <!-- Head -->
    <circle cx="100" cy="70" r="22" fill="none" stroke="#22d3ee" stroke-width="3"/>
    
    <!-- Hair top -->
    <path d="M 78 70 Q 78 50 100 45 Q 122 50 122 70" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Neck -->
    <path d="M 90 90 L 88 105" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 110 90 L 112 105" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Shoulders/body -->
    <path d="M 60 105 Q 100 115 140 105" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Torso outline -->
    <path d="M 65 105 L 70 160 L 130 160 L 135 105" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Collar accent -->
    <path d="M 88 105 L 95 115 L 105 115 L 112 105" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
