<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neon-glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.8; }
      }
      .neon-wallet {
        animation: pulse 2s ease-in-out infinite;
        filter: drop-shadow(0 0 8px #22d3ee) drop-shadow(0 0 16px #0891b2);
      }
    </style>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="20" y="20" width="160" height="160" rx="32" fill="#001a1f" stroke="#0891b2" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Main wallet outline -->
  <g class="neon-wallet">
    <!-- Wallet body -->
    <rect x="45" y="65" width="110" height="70" rx="6" fill="none" stroke="#22d3ee" stroke-width="3"/>
    
    <!-- Wallet flap/top -->
    <path d="M 45 65 L 60 45 L 155 45 L 145 65" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linejoin="round"/>
    
    <!-- Diagonal line inside wallet -->
    <line x1="50" y1="70" x2="140" y2="125" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Card slot -->
    <rect x="115" y="85" width="25" height="35" rx="3" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
  </g>
</svg>
