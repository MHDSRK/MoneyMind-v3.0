<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neon-glow-favicon">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes glow-pulse {
        0%, 100% { 
          opacity: 1;
          filter: drop-shadow(0 0 8px #22d3ee) drop-shadow(0 0 16px #0891b2) drop-shadow(0 0 24px rgba(34,211,238,0.4));
        }
        50% { 
          opacity: 0.9;
          filter: drop-shadow(0 0 12px #22d3ee) drop-shadow(0 0 24px #0891b2) drop-shadow(0 0 32px rgba(34,211,238,0.6));
        }
      }
      .wallet-glow {
        animation: glow-pulse 3s ease-in-out infinite;
      }
    </style>
  </defs>
  
  <!-- Background rounded square with subtle glow -->
  <rect x="15" y="15" width="170" height="170" rx="36" fill="#000814" stroke="#0891b2" stroke-width="2" opacity="0.4" filter="url(#neon-glow-favicon)"/>
  
  <!-- Main wallet outline with enhanced glow -->
  <g class="wallet-glow">
    <!-- Wallet body - main container -->
    <rect x="42" y="68" width="116" height="68" rx="8" fill="none" stroke="#22d3ee" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Wallet flap/lid with gradient effect -->
    <path d="M 42 68 L 58 42 L 158 42 L 152 68" fill="none" stroke="#22d3ee" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Front fold line for depth -->
    <path d="M 58 42 L 52 68" stroke="#22d3ee" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    
    <!-- Diagonal card separator (main visual) -->
    <line x1="48" y1="75" x2="144" y2="128" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Card slot detail -->
    <rect x="116" y="82" width="28" height="42" rx="4" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
  </g>
</svg>
