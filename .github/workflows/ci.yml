name: CI

on:
push:
branches:
- main
- master
- develop
pull_request:
branches:
- main
- master
- develop

permissions:
contents: read

jobs:
typecheck:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v5

  - name: Setup Node
    uses: actions/setup-node@v5
    with:
      node-version: 22

  - name: Setup pnpm
    uses: pnpm/action-setup@v4
    with:
      version: 10.30.3

  - name: Install dependencies
    run: pnpm install --frozen-lockfile

  - name: TypeScript
    run: pnpm typecheck
```

build:
runs-on: ubuntu-latest
needs: typecheck

```
steps:
  - name: Checkout
    uses: actions/checkout@v5

  - name: Setup Node
    uses: actions/setup-node@v5
    with:
      node-version: 22

  - name: Setup pnpm
    uses: pnpm/action-setup@v4
    with:
      version: 10.30.3

  - name: Install dependencies
    run: pnpm install --frozen-lockfile

  - name: Build
    run: pnpm build
```

test:
runs-on: ubuntu-latest
needs: typecheck

```
steps:
  - name: Checkout
    uses: actions/checkout@v5

  - name: Setup Node
    uses: actions/setup-node@v5
    with:
      node-version: 22

  - name: Setup pnpm
    uses: pnpm/action-setup@v4
    with:
      version: 10.30.3

  - name: Install dependencies
    run: pnpm install --frozen-lockfile

  - name: Run tests
    run: pnpm test -- --run
```
