name: CI

on:
push:
branches:
- main
- master
- develop

pull_request:
branches:
- main
- master
- develop

permissions:
contents: read

concurrency:
group: ci-${{ github.workflow }}-${{ github.ref }}
cancel-in-progress: true

jobs:
typecheck:
name: TypeScript Type Check
runs-on: ubuntu-latest
timeout-minutes: 10

steps:
  - name: Checkout repository
    uses: actions/checkout@v5

  - name: Setup pnpm
    uses: pnpm/action-setup@v4
    with:
      version: 10.30.3

  - name: Setup Node.js
    uses: actions/setup-node@v5
    with:
      node-version: 22
      cache: pnpm

  - name: Install dependencies
    run: pnpm install --frozen-lockfile

  - name: TypeScript type check
    run: pnpm typecheck

build:
name: Production Build
needs: typecheck
runs-on: ubuntu-latest
timeout-minutes: 10

steps:
  - name: Checkout repository
    uses: actions/checkout@v5

  - name: Setup pnpm
    uses: pnpm/action-setup@v4
    with:
      version: 10.30.3

  - name: Setup Node.js
    uses: actions/setup-node@v5
    with:
      node-version: 22
      cache: pnpm

  - name: Install dependencies
    run: pnpm install --frozen-lockfile

  - name: Build application
    run: pnpm build

  - name: Upload build artifacts
    uses: actions/upload-artifact@v5
    with:
      name: build
      path: dist/
      retention-days: 7

test:
name: Run Tests
needs: typecheck
runs-on: ubuntu-latest
timeout-minutes: 10

steps:
  - name: Checkout repository
    uses: actions/checkout@v5

  - name: Setup pnpm
    uses: pnpm/action-setup@v4
    with:
      version: 10.30.3

  - name: Setup Node.js
    uses: actions/setup-node@v5
    with:
      node-version: 22
      cache: pnpm

  - name: Install dependencies
    run: pnpm install --frozen-lockfile

  - name: Run tests
    run: pnpm test -- --run

  - name: Generate coverage
    run: pnpm test:coverage -- --run
    continue-on-error: true
