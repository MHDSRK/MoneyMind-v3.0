name: CI

on:
push:
branches: [main, master, develop]
pull_request:
branches: [main, master, develop]

permissions:
contents: read

concurrency:
group: ci-${{ github.ref }}
cancel-in-progress: true

jobs:
typecheck:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v5

  - uses: actions/setup-node@v5
    with:
      node-version: 22

  - uses: pnpm/action-setup@v4
    with:
      version: 10.30.3

  - run: pnpm --version

  - run: pnpm install --frozen-lockfile

  - run: pnpm typecheck
```

build:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v5

  - uses: actions/setup-node@v5
    with:
      node-version: 22

  - uses: pnpm/action-setup@v4
    with:
      version: 10.30.3

  - run: pnpm install --frozen-lockfile

  - run: pnpm build
```

test:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v5

  - uses: actions/setup-node@v5
    with:
      node-version: 22

  - uses: pnpm/action-setup@v4
    with:
      version: 10.30.3

  - run: pnpm install --frozen-lockfile

  - run: pnpm test -- --run
```
